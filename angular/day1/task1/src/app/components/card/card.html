<div class="max-w-sm bg-white border border-gray-200 rounded-2xl shadow-sm hover:shadow-xl transition-shadow duration-300 overflow-hidden">
  <img class="w-full h-48 object-cover" 
       [src]="'https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&q=80&w=500'" 
       alt="User Profile" />
  
  <div class="p-6 text-center">
    <h5 class="mb-1 text-xl font-bold text-gray-900">{{ userData.name }}</h5>
    <span class="text-sm text-gray-500 uppercase tracking-widest">{{ userData.role }}</span>
    
    <div class="mt-6">
      <button (click)="checkRole()" 
              class="w-full px-4 py-2 text-white bg-linear-to-r from-blue-500 to-blue-700 hover:from-blue-600 hover:to-blue-800 rounded-lg font-medium transition-all transform active:scale-95">
        View Permissions
      </button>
    </div>
  </div>
</div>
