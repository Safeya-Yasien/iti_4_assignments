<div class="max-w-md mx-auto mt-20 p-8 bg-neutral-900 rounded-2xl border border-white/5 shadow-2xl">
  <h2 class="text-3xl font-bold text-white mb-6">Create Account</h2>

  <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="space-y-4">
    <div>
      <input
        formControlName="username"
        placeholder="Username"
        class="w-full bg-neutral-800 border border-white/10 rounded-lg px-4 py-3 text-white focus:border-emerald-500 outline-none transition-all"
      />
      <p
        *ngIf="isSubmitted() && registerForm.get('username')?.errors?.['required']"
        class="text-red-500 text-xs mt-1"
      >
        Username is required
      </p>
    </div>

    <div>
      <input
        formControlName="email"
        type="email"
        placeholder="Email Address"
        class="w-full bg-neutral-800 border border-white/10 rounded-lg px-4 py-3 text-white focus:border-emerald-500 outline-none transition-all"
      />
      <p
        *ngIf="isSubmitted() && registerForm.get('email')?.errors?.['email']"
        class="text-red-500 text-xs mt-1"
      >
        Enter a valid email
      </p>
    </div>

    <div>
      <input
        formControlName="password"
        type="password"
        placeholder="Password"
        class="w-full bg-neutral-800 border border-white/10 rounded-lg px-4 py-3 text-white focus:border-emerald-500 outline-none transition-all"
      />
    </div>

    <div>
      <input
        formControlName="confirmPassword"
        type="password"
        placeholder="Confirm Password"
        class="w-full bg-neutral-800 border border-white/10 rounded-lg px-4 py-3 text-white focus:border-emerald-500 outline-none transition-all"
      />
      <p
        *ngIf="isSubmitted() && registerForm.hasError('mismatch')"
        class="text-red-500 text-xs mt-1"
      >
        Passwords do not match
      </p>
    </div>

    <button
      type="submit"
      class="w-full bg-emerald-500 hover:bg-emerald-400 text-neutral-950 font-bold py-3 rounded-lg transition-all"
    >
      Register Now
    </button>
  </form>
</div>
