<div class="relative bg-neutral-950 min-h-screen text-white">
  <div *ngIf="featuredMovie" class="relative h-[85vh] w-full overflow-hidden">
    <img
      [src]="'https://image.tmdb.org/t/p/original' + featuredMovie.backdrop_path"
      class="absolute inset-0 w-full h-full object-cover"
      [alt]="featuredMovie.title"
    />

    <div
      class="absolute inset-0 bg-gradient-to-r from-neutral-950 via-neutral-950/40 to-transparent"
    ></div>
    <div
      class="absolute inset-0 bg-gradient-to-t from-neutral-950 via-transparent to-transparent"
    ></div>

    <div class="absolute inset-0 flex flex-col justify-center px-6 md:px-16 max-w-3xl space-y-6">
      <span
        class="inline-block px-3 py-1 bg-emerald-500/20 border border-emerald-500/50 text-emerald-400 text-xs font-bold rounded-full uppercase tracking-widest"
      >
        Featured Today
      </span>
      <h1 class="text-5xl md:text-7xl font-black leading-tight drop-shadow-2xl">
        {{ featuredMovie.title }}
      </h1>
      <p class="text-gray-300 text-lg line-clamp-3 md:line-clamp-none max-w-xl">
        {{ featuredMovie.overview }}
      </p>

      <div class="flex items-center gap-4 pt-4">
        <button
          class="px-8 py-3 bg-emerald-600 hover:bg-emerald-500 text-neutral-950 font-bold rounded-lg transition-all flex items-center gap-2"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="currentColor"
            class="w-5 h-5"
            viewBox="0 0 24 24"
          >
            <path d="M8 5v14l11-7z" />
          </svg>
          Watch Trailer
        </button>
        <button
          class="px-8 py-3 bg-white/10 hover:bg-white/20 backdrop-blur-md text-white font-bold rounded-lg border border-white/10 transition-all"
        >
          View Details
        </button>
      </div>
    </div>
  </div>

  <div class="px-6 md:px-16 -mt-32 relative z-10 space-y-16 pb-20">
    <section *ngIf="trendingMovies.length > 0">
      <h3 class="text-2xl font-bold mb-6 flex items-center gap-3">
        <span class="w-1 h-8 bg-emerald-500 rounded-full"></span>
        Trending Now
      </h3>
      <div class="flex gap-4 overflow-x-auto no-scrollbar pb-4">
        <div
          *ngFor="let movie of trendingMovies"
          class="min-w-[160px] md:min-w-[220px] group cursor-pointer"
        >
          <div
            class="relative overflow-hidden rounded-xl border border-white/5 shadow-2xl transition-transform duration-300 group-hover:scale-105 group-hover:border-emerald-500/50"
          >
            <img
              [src]="'https://image.tmdb.org/t/p/w500' + movie.poster_path"
              class="w-full h-full object-cover"
              [alt]="movie.title"
            />
            <div
              class="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 transition-opacity flex flex-col justify-end p-4"
            >
              <span class="text-xs font-bold text-emerald-400"
                >★ {{ movie.vote_average | number: '1.1-1' }}</span
              >
              <p class="text-sm font-bold truncate">{{ movie.title }}</p>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section *ngIf="popularMovies.length > 0">
      <h3 class="text-2xl font-bold mb-6 flex items-center gap-3">
        <span class="w-1 h-8 bg-cyan-500 rounded-full"></span>
        Popular Movies
      </h3>
      <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-6">
        <div *ngFor="let movie of popularMovies" class="group cursor-pointer">
          <div class="overflow-hidden rounded-lg shadow-lg">
            <img
              [src]="'https://image.tmdb.org/t/p/w500' + movie.poster_path"
              class="w-full transition-transform duration-300 group-hover:scale-110 group-hover:ring-2 group-hover:ring-emerald-500"
              [alt]="movie.title"
            />
          </div>
          <h4
            class="mt-3 text-sm font-medium text-gray-400 group-hover:text-white transition-colors truncate"
          >
            {{ movie.title }}
          </h4>
        </div>
      </div>
    </section>
  </div>
</div>
