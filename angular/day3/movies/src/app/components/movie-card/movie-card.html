<div class="bg-gray-800 rounded-lg overflow-hidden shadow-md">
  <img [src]="movie.image" alt="poster" class="w-full h-64 object-cover">
  <div class="p-4">
    <h3 class="text-xl font-bold text-white">{{ movie.title }}</h3>
    <button [routerLink]="['/movie', movie.id]" 
            class="mt-3 bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded">
      Show Details
    </button>
  </div>
</div>
