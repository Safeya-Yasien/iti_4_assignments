<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
  <div *ngFor="let movie of movies" 
       class="group bg-gray-900 rounded-xl overflow-hidden shadow-lg transform transition duration-300 hover:-translate-y-2 hover:shadow-2xl border border-gray-800">
    
    <div class="relative overflow-hidden">
      <img [src]="movie.image" 
           [alt]="movie.title" 
           class="w-full h-100 object-cover transition duration-500 group-hover:scale-110">
      
      <div class="absolute inset-0 bg-linear-to-t from-black/80 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-end p-4">
        <p class="text-white text-sm italic">{{ movie.year }}</p>
      </div>
    </div>

    <div class="p-5">
      <h3 class="text-xl font-bold text-white truncate mb-2">{{ movie.title }}</h3>
      <p class="text-gray-400 text-sm line-clamp-2 mb-4 leading-relaxed">
        {{ movie.description }}
      </p>
      
      <a [routerLink]="['/movie', movie.id]" 
         class="inline-block w-full text-center bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-lg transition-colors duration-200 shadow-md">
        View Details
      </a>
    </div>
  </div>
</div>
