<div class="space-y-6">
  <div
    class="flex flex-col md:flex-row md:items-center justify-between gap-4 bg-white p-6 rounded-2xl shadow-sm border border-gray-100"
  >
    <div>
      <h2 class="text-2xl font-bold text-gray-800">Movies Management</h2>
      <p class="text-gray-500 text-sm">Add, edit, or remove movies from your catalog</p>
    </div>
    <button
      class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-xl font-semibold transition flex items-center gap-2 w-fit"
    >
      <span class="text-xl leading-none">+</span> Add New Movie
    </button>
  </div>

  <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
    <div class="overflow-x-auto">
      <table class="w-full text-left border-collapse">
        <thead class="bg-gray-50 border-b border-gray-100">
          <tr>
            <th class="px-6 py-4 text-xs uppercase font-bold text-gray-400 tracking-wider">
              Movie
            </th>
            <th class="px-6 py-4 text-xs uppercase font-bold text-gray-400 tracking-wider">
              Release Year
            </th>
            <th class="px-6 py-4 text-xs uppercase font-bold text-gray-400 tracking-wider">
              Status
            </th>
            <th class="px-6 py-4 text-xs uppercase font-bold text-gray-400 tracking-wider">
              Actions
            </th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-50">
          <tr *ngFor="let movie of movies()" class="hover:bg-gray-50/50 transition">
            <td class="px-6 py-4">
              <div class="flex items-center gap-4">
                <img
                  [src]="movie.image"
                  class="w-12 h-16 object-cover rounded-lg shadow-sm"
                  [alt]="movie.title"
                />
                <div>
                  <div class="font-bold text-gray-800">{{ movie.title }}</div>
                  <div class="text-xs text-gray-400 truncate max-w-[200px]">
                    {{ movie.description }}
                  </div>
                </div>
              </div>
            </td>
            <td class="px-6 py-4">
              <span class="text-gray-600 font-medium">{{ movie.year }}</span>
            </td>
            <td class="px-6 py-4">
              <span class="px-3 py-1 bg-green-100 text-green-700 text-xs font-bold rounded-full"
                >Active</span
              >
            </td>
            <td class="px-6 py-4">
              <div class="flex items-center gap-3">
                <button
                  class="p-2 text-blue-600 hover:bg-blue-50 rounded-lg transition"
                  title="Edit"
                >
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    class="w-5 h-5"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke="currentColor"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"
                    />
                  </svg>
                </button>
                <button
                  class="p-2 text-red-600 hover:bg-red-50 rounded-lg transition"
                  title="Delete"
                >
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    class="w-5 h-5"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke="currentColor"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"
                    />
                  </svg>
                </button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="p-6 border-t border-gray-100 flex items-center justify-between">
      <span class="text-sm text-gray-500 italic">Showing {{ movies.length }} movies</span>
      <div class="flex gap-2">
        <button
          class="px-4 py-2 border border-gray-200 rounded-lg text-sm disabled:opacity-50"
          disabled
        >
          Previous
        </button>
        <button class="px-4 py-2 bg-gray-800 text-white rounded-lg text-sm">Next</button>
      </div>
    </div>
  </div>
</div>
