<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Task Management Dashboard</h1>

      <div id="taskFormContainer" class="card">
        <h3>Add New Task</h3>
        <input type="text" id="titleInput" placeholder="Task Title" />
        <textarea id="descInput" placeholder="Description"></textarea>
        <input type="date" id="dateInput" />
        <button onclick="handleAddTask()" id="add">Add Task</button>
      </div>

      <table>
        <thead>
          <tr>
            <th>Title</th>
            <th>Description</th>
            <th>Status</th>
            <th>Deadline</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="taskTableBody"></tbody>
      </table>
    </div>
    <script src="main.js"></script>
  </body>
</html>
